services:
  ob1:
    image: postgres:17
    container_name: argus-openbrain
    environment:
      POSTGRES_DB: openbrain
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: argus
    ports:
      - "5432:5432"
    volumes:
      - ${USERPROFILE}/.hermes-data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d openbrain"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - stack

  cognee-server:
    build: ./cognee-server
    container_name: cognee-server
    env_file:
      - ./cognee-server/.env
      - ./cognee-server/.env.llm.active
    ports:
      - "8000:8000"
    volumes:
      - ${USERPROFILE}/.hermes-data/cognee/.cognee_system:/app/.cognee_system
      - ${USERPROFILE}/.hermes-data/cognee/.data_storage:/app/.data_storage
    depends_on:
      ob1:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - stack

networks:
  stack:
    driver: bridge
